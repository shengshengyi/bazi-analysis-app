<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>八字分析应用 - 参天AI</title>
  <link rel="stylesheet" href="css/style.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="container">
    <header class="header">
      <h1>八字分析应用</h1>
      <p class="subtitle">基于参天AI - 精准排盘 · 五维分析</p>
    </header>

    <main class="main">
      <!-- 输入区域 -->
      <section class="input-section">
        <div class="card">
          <h2>排盘信息</h2>

          <div class="input-type-toggle">
            <button class="toggle-btn active" data-type="solar">公历</button>
            <button class="toggle-btn" data-type="lunar">农历</button>
          </div>

          <!-- 公历输入 -->
          <div id="solar-input" class="input-group">
            <div class="form-row">
              <div class="form-field">
                <label>出生日期</label>
                <input type="date" id="solar-date" value="1998-07-31">
              </div>
              <div class="form-field">
                <label>出生时间</label>
                <input type="time" id="solar-time" value="14:10">
              </div>
            </div>
          </div>

          <!-- 农历输入 -->
          <div id="lunar-input" class="input-group hidden">
            <div class="form-row">
              <div class="form-field">
                <label>年</label>
                <input type="number" id="lunar-year" value="1998" min="1900" max="2100">
              </div>
              <div class="form-field">
                <label>月</label>
                <input type="number" id="lunar-month" value="6" min="1" max="12">
              </div>
              <div class="form-field">
                <label>日</label>
                <input type="number" id="lunar-day" value="9" min="1" max="30">
              </div>
              <div class="form-field">
                <label>时</label>
                <select id="lunar-hour">
                  <option value="0">子时(23-1)</option>
                  <option value="2">丑时(1-3)</option>
                  <option value="4">寅时(3-5)</option>
                  <option value="6">卯时(5-7)</option>
                  <option value="8">辰时(7-9)</option>
                  <option value="10">巳时(9-11)</option>
                  <option value="12">午时(11-13)</option>
                  <option value="14" selected>未时(13-15)</option>
                  <option value="16">申时(15-17)</option>
                  <option value="18">酉时(17-19)</option>
                  <option value="20">戌时(19-21)</option>
                  <option value="22">亥时(21-23)</option>
                </select>
              </div>
            </div>
            <div class="form-row">
              <label class="checkbox-label">
                <input type="checkbox" id="lunar-leap">
                <span>闰月</span>
              </label>
            </div>
          </div>

          <!-- 通用设置 -->
          <div class="form-row">
            <div class="form-field">
              <label>性别</label>
              <div class="radio-group">
                <label class="radio-label">
                  <input type="radio" name="gender" value="male" checked>
                  <span>男</span>
                </label>
                <label class="radio-label">
                  <input type="radio" name="gender" value="female">
                  <span>女</span>
                </label>
              </div>
            </div>
          </div>

          <!-- 真太阳时 -->
          <div class="form-row">
            <label class="checkbox-label">
              <input type="checkbox" id="use-true-solar">
              <span>使用真太阳时校正</span>
            </label>
          </div>

          <div id="longitude-input" class="form-row hidden">
            <div class="form-field">
              <label>出生地经度（用于真太阳时校正）</label>
              <input type="number" id="longitude" value="116.4074" step="0.0001" placeholder="例如: 116.4074 (北京)">
              <small>东经为正，西经为负。北京约116.4，上海约121.5，广州约113.3</small>
            </div>
          </div>

          <!-- 分析维度选择 -->
          <div class="analysis-dims">
            <label>分析维度</label>
            <div class="checkbox-group">
              <label class="checkbox-label">
                <input type="checkbox" class="dim-checkbox" value="career" checked>
                <span>职业</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="dim-checkbox" value="wealth" checked>
                <span>财富</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="dim-checkbox" value="fortune" checked>
                <span>运势</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="dim-checkbox" value="personality" checked>
                <span>性格</span>
              </label>
              <label class="checkbox-label">
                <input type="checkbox" class="dim-checkbox" value="health" checked>
                <span>健康</span>
              </label>
            </div>
          </div>

          <button id="analyze-btn" class="btn-primary">
            <span class="btn-text">开始分析</span>
            <span class="btn-loading hidden">分析中...</span>
          </button>
        </div>
      </section>

      <!-- 结果区域 -->
      <section id="result-section" class="result-section hidden">
        <!-- 排盘结果 -->
        <div class="card bazi-card">
          <h2>八字排盘</h2>
          <div class="bazi-info">
            <div class="info-row">
              <span class="label">性别:</span>
              <span id="result-gender">-</span>
            </div>
            <div class="info-row">
              <span class="label">阳历:</span>
              <span id="result-solar">-</span>
            </div>
            <div class="info-row">
              <span class="label">农历:</span>
              <span id="result-lunar">-</span>
            </div>
            <div class="info-row">
              <span class="label">生肖:</span>
              <span id="result-zodiac">-</span>
            </div>
            <div class="info-row">
              <span class="label">日主:</span>
              <span id="result-daymaster" class="highlight">-</span>
            </div>
          </div>

          <!-- 四柱表格 -->
          <div class="pillars-table">
            <div class="pillar-header">
              <span></span>
              <span>年柱</span>
              <span>月柱</span>
              <span>日柱</span>
              <span>时柱</span>
            </div>
            <div class="pillar-row">
              <span class="row-label">天干</span>
              <span id="year-stem" class="stem">-</span>
              <span id="month-stem" class="stem">-</span>
              <span id="day-stem" class="stem day-stem">-</span>
              <span id="hour-stem" class="stem">-</span>
            </div>
            <div class="pillar-row">
              <span class="row-label">十神</span>
              <span id="year-shishen" class="shishen">-</span>
              <span id="month-shishen" class="shishen">-</span>
              <span id="day-shishen" class="shishen">-</span>
              <span id="hour-shishen" class="shishen">-</span>
            </div>
            <div class="pillar-row">
              <span class="row-label">地支</span>
              <span id="year-branch" class="branch">-</span>
              <span id="month-branch" class="branch">-</span>
              <span id="day-branch" class="branch">-</span>
              <span id="hour-branch" class="branch">-</span>
            </div>
            <div class="pillar-row hidden-stems">
              <span class="row-label">藏干</span>
              <span id="year-hidden" class="hidden-stem">-</span>
              <span id="month-hidden" class="hidden-stem">-</span>
              <span id="day-hidden" class="hidden-stem">-</span>
              <span id="hour-hidden" class="hidden-stem">-</span>
            </div>
          </div>

          <!-- 神煞 -->
          <div class="shensha-section">
            <h3>神煞</h3>
            <div id="shensha-list" class="tag-list"></div>
          </div>
        </div>

        <!-- 五维分析 -->
        <div class="card analysis-card">
          <h2>五维分析</h2>
          <div class="chart-container">
            <canvas id="radar-chart"></canvas>
          </div>

          <div id="dimensions-list" class="dimensions-list">
            <!-- 动态生成 -->
          </div>
        </div>

        <!-- 大运 -->
        <div class="card dayun-card">
          <h2>大运</h2>
          <div id="dayun-start" class="dayun-info"></div>
          <div class="dayun-table-wrapper">
            <table id="dayun-table" class="dayun-table">
              <thead>
                <tr>
                  <th>大运</th>
                  <th>年龄</th>
                  <th>年份</th>
                  <th>天干十神</th>
                </tr>
              </thead>
              <tbody></tbody>
            </table>
          </div>
        </div>

        <!-- 综合建议 -->
        <div class="card advice-card">
          <h2>综合建议</h2>
          <ul id="advice-list"></ul>
        </div>
      </section>
    </main>

    <footer class="footer">
      <p>Powered by <a href="https://cantian.ai" target="_blank">Cantian AI</a> | 基于 bazi-mcp</p>
    </footer>
  </div>

  <script src="js/app.js"></script>
</body>
</html>
